name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35
        run: |
          cmdline_path=$(find ${ANDROID_HOME}/cmdline-tools -name "sdkmanager" -type f 2>/dev/null | head -1)
          if [ -z "$cmdline_path" ]; then
            echo "ERROR: sdkmanager not found"
            exit 1
          fi
          sdkmanager="$cmdline_path"
          echo "Using sdkmanager: $sdkmanager"
          yes | "$sdkmanager" --licenses || true
          "$sdkmanager" "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Diagnostic - environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "SDK platforms:"
          ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "no platforms dir"
          echo "gradlew exists: $(test -f gradlew && echo yes || echo no)"
          echo "wrapper jar: $(ls -la gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo no)"

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace --warning-mode all 2>&1 | tee gradle-build.log
          exit ${PIPESTATUS[0]}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BeerZaao-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
