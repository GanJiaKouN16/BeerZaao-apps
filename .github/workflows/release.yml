name: Auto Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35
        run: |
          cmdline_path=$(find ${ANDROID_HOME}/cmdline-tools -name "sdkmanager" -type f 2>/dev/null | head -1)
          if [ -z "$cmdline_path" ]; then
            echo "ERROR: sdkmanager not found"
            exit 1
          fi
          sdkmanager="$cmdline_path"
          echo "Using sdkmanager: $sdkmanager"
          yes | "$sdkmanager" --licenses || true
          "$sdkmanager" "platforms;android-35" "build-tools;35.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "BeerZaao-${RELEASE_VERSION}.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BeerZaao v${{ env.RELEASE_VERSION }}
          files: BeerZaao-${{ env.RELEASE_VERSION }}.apk
          generate_release_notes: true
          fail_on_unmatched_files: false

      - name: Update update.json
        run: |
          cat > update.json << 'EOF'
          {
            "version": "${{ env.RELEASE_VERSION }}",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/BeerZaao-${{ env.RELEASE_VERSION }}.apk",
            "release_date": "$(date -u +%Y-%m-%d)",
            "notes": "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          }
          EOF

      - name: Commit and push update.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git commit -m "chore: update update.json to v${{ env.RELEASE_VERSION }} [skip ci]"
          git push
